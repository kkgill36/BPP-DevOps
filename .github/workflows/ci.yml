name: CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  security-and-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: KICS scan
        uses: Checkmarx/kics-github-action@v2.1.20
        with:
          path: .
          output_path: kics-results
          fail_on: none
          enable_comments: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for security scan
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/incident-app:${{ github.sha }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/incident-app:${{ github.sha }}
          format: table
          exit-code: "0"
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push multi-architecture image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/incident-app:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/incident-app:latest