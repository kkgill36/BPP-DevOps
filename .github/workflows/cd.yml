name: CD Pipeline b

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        run: |
          az aks get-credentials \
            --resource-group rg-bpp-devops \
            --name aks-bpp-devops \
            --overwrite-existing

      - name: Deploy App
        run: |
          kubectl apply -f k8s/
          kubectl set image deployment/incident-app incident-app=ghcr.io/${{ github.repository_owner }}/incident-app:${{ github.sha }}

      - name: Wait for Rollout
        run: kubectl rollout status deployment/incident-app --timeout=120s

      - name: Health Check
        run: |
          kubectl port-forward svc/incident-app-service 5001:80 &
          sleep 10
          curl -f http://localhost:5001/health

      - name: Rollback if Failed
        if: failure()
        run: kubectl rollout undo deployment/incident-app