name: CD Pipeline

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        run: |
          az aks get-credentials \
            --resource-group rg-bpp-devops \
            --name aks-bpp-devops \
            --overwrite-existing

      - name: Deploy App
        run: |
          kubectl apply -f k8s/
          kubectl set image deployment/incident-app \
            incident-app=ghcr.io/${{ github.repository_owner }}/incident-app:${{ github.sha }}

      - name: Verify deployment availability
        run: |
          kubectl wait --for=condition=available deployment/incident-app --timeout=180s
          kubectl get pods -l app=incident-app

      - name: Health check
        run: |
          kubectl port-forward service/incident-app-service 5001:80 &
          PF_PID=$!

          sleep 10

          curl --fail --retry 5 --retry-delay 5 http://localhost:5001/health

          kill $PF_PID

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment or health check failed. Rolling back..."
          kubectl rollout undo deployment/incident-app
          kubectl wait --for=condition=available deployment/incident-app --timeout=120s
          kubectl get pods -l app=incident-app